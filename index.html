<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apparel Landings — 5 E-commerce Concepts</title>
  <style>
    :root { --bg: #F7F5F2; --text: #1A1A1A; --muted: #888; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text);
      padding: 2rem;
    }
    main { max-width: 720px; text-align: center; }
    h1 { font-size: clamp(2rem, 6vw, 3.5rem); margin: 0 0 0.5rem; letter-spacing: -0.02em; }
    p { color: var(--muted); margin: 0 0 2.5rem; }
    .grid { display: grid; gap: 1rem; }
    a {
      display: block; padding: 1.25rem 1.5rem; border: 1px solid rgba(26,26,26,0.12);
      text-decoration: none; color: inherit; background: #fff;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .brand { font-size: 1.25rem; font-weight: 500; letter-spacing: 0.04em; }
    .desc { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }
    @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <main>
    <h1>Apparel Landings</h1>
    <p>Five e-commerce apparel landing page concepts.</p>
    <nav class="grid" aria-label="Landing pages">
      <a href="/01-arlo-editorial/index.html">
        <div class="brand">ARLO</div>
        <div class="desc">Editorial quiet luxury</div>
      </a>
      <a href="/02-vox-streetwear/index.html">
        <div class="brand">VOX</div>
        <div class="desc">Streetwear drop culture</div>
      </a>
      <a href="/03-luma-lifestyle/index.html">
        <div class="brand">LUMA</div>
        <div class="desc">Soft lifestyle</div>
      </a>
      <a href="/04-kilt-brutalist/index.html">
        <div class="brand">KILT</div>
        <div class="desc">Brutalist experimental</div>
      </a>
      <a href="/05-elan-moody/index.html">
        <div class="brand">ÉLAN</div>
        <div class="desc">Retro football jerseys</div>
      </a>
    </nav>
  </main>
</body>
</html>
